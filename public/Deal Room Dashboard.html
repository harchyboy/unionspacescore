        theme: {
            extend: {
                colors: {
                    border: "var(--border)",
                    input: "var(--input)",

                    background: "var(--background)",
                    foreground: "var(--foreground)",
                    primary: {
                        DEFAULT: "var(--primary)",

                    },
                    secondary: {

                    },
                    destructive: {

                    },
                    muted: {

                    },
                    accent: {
                        DEFAULT: "var(--accent)",
                        foreground: "var(--accent-foreground)",
                    },
                    card: {
                        DEFAULT: "var(--card)",
                        foreground: "var(--card-foreground)",
                    },
                },
                borderRadius: {
                    lg: "var(--radius)",
                    md: "calc(var(--radius) - 2px)",
                    sm: "calc(var(--radius) - 4px)",
                },
                fontFamily: {
                    sans: ["var(--font-sans)"],
                    serif: ["var(--font-serif)"],
                    mono: ["var(--font-mono)"],
                },
                boxShadow: {
                    'DEFAULT': 'var(--shadow)',
                },
            },
        }
    }
    </script>

        window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};

let filteredDeals = [...mockDeals];

function formatCurrency(amount) {
    return new Intl.NumberFormat('en-GB', {
        style: 'currency',
        currency: 'GBP',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
    }).format(amount);
}

function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function getStageColor(stage) {
    const colors = {
        'Inquiry': 'default',
        'Viewing': 'primary',
        'Heads of Terms': 'warning',
        'Legals': 'warning',
        'Signed': 'success',
        'Lost': 'destructive'
    };
    return colors[stage] || 'default';
}

function getRiskColor(risk) {
    return risk === 'High' ? 'destructive' : risk === 'Medium' ? 'warning' : 'success';
}

function getApprovalColor(approval) {
    return approval === 'Pending' ? 'warning' : 'success';
}

function renderDealRow(deal, index) {
    const stageColor = getStageColor(deal.stage);
    const riskColor = getRiskColor(deal.status.risk);
    const approvalColor = getApprovalColor(deal.status.approvals);

    return `
        <tr class="${bgClass} hover:bg-[#fafafa] transition-all">
            <td class="px-4 py-4">
                <a href="Deal Room Setup.html" class="text-primary hover:text-primary/80 font-medium hover:underline">
                    ${deal.name}
                </a>
                ${deal.requirementCode ? `<div class="text-xs text-secondary mt-0.5">${deal.requirementCode}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="text-sm text-primary">${deal.property.name}</div>
                ${(deal.property.unit || deal.property.floor) ? `<div class="text-xs text-secondary">${deal.property.unit || deal.property.floor}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="text-sm text-primary">${deal.tenant.companyName}</div>
                ${deal.tenant.mainContact ? `<div class="text-xs text-secondary">${deal.tenant.mainContact.name}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${
                    stageColor === 'primary' ? 'bg-primary text-white' :
                    stageColor === 'warning' ? 'bg-yellow-500 text-white' :
                    stageColor === 'success' ? 'bg-green-600 text-white' :
                    stageColor === 'destructive' ? 'bg-destructive text-white' :
                    'bg-muted text-primary'
                }">${deal.stage}</span>
            </td>
            <td class="px-4 py-4">
                <div class="flex items-center space-x-2">
                    ${deal.owner.avatar ? 
                        `<img src="${deal.owner.avatar}" alt="${deal.owner.name}" class="w-8 h-8 rounded-full object-cover">` :
                        `<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white text-xs font-semibold">${getInitials(deal.owner.name)}</div>`
                    }
                    <span class="text-sm text-primary">${deal.owner.name}</span>
                </div>
            </td>
            <td class="px-4 py-4 text-right">
                ${deal.commercial.monthlyRent ? `<div class="text-sm font-medium text-primary">${formatCurrency(deal.commercial.monthlyRent)}/mo</div>` : ''}
                ${deal.commercial.totalAnnualValue ? `<div class="text-xs text-secondary">${formatCurrency(deal.commercial.totalAnnualValue)}/yr</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="flex items-center space-x-2">
                    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${
                        riskColor === 'destructive' ? 'bg-destructive text-white' :
                        riskColor === 'warning' ? 'bg-yellow-500 text-white' :
                        'bg-green-600 text-white'
                    }">${deal.status.risk}</span>

                ${deal.nextStep ? `
                    ${deal.nextStep.date ? `<div class="text-xs text-secondary mb-0.5">${deal.nextStep.date}</div>` : ''}
                    <div class="text-sm text-primary">${deal.nextStep.description}</div>
                ` : '<span class="text-sm text-secondary">None</span>'}
            </td>
            <td class="px-4 py-4 text-right">
                <a href="Deal Room Setup.html" class="text-primary hover:text-primary/80 text-sm font-medium">View</a>
            </td>
        </tr>
    `;
}

function updateMetrics() {
    const openDeals = filteredDeals.filter(d => d.stage !== 'Signed' && d.stage !== 'Lost');
    const totalMonthlyValue = openDeals.reduce((sum, deal) => sum + (deal.commercial.monthlyRent || 0), 0);
    const totalDaysInStage = openDeals.reduce((sum, deal) => sum + (deal.daysInStage || 0), 0);
    const averageDaysInStage = openDeals.length > 0 ? Math.round(totalDaysInStage / openDeals.length) : 0;
    
    document.getElementById('metric-open-deals').textContent = openDeals.length;
    document.getElementById('metric-monthly-value').textContent = formatCurrency(totalMonthlyValue);
    document.getElementById('metric-avg-days').textContent = `${averageDaysInStage} days`;
}

function filterDeals() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const stage = document.getElementById('filter-stage').value;
    const owner = document.getElementById('filter-owner').value;
    const dealType = document.getElementById('filter-deal-type').value;
    const property = document.getElementById('filter-property').value;
    
    filteredDeals = mockDeals.filter(deal => {
        if (search && !deal.name.toLowerCase().includes(search) && 
            !deal.tenant.companyName.toLowerCase().includes(search) &&
            !(deal.requirementCode && deal.requirementCode.toLowerCase().includes(search))) {
            return false;
        }
        if (stage !== 'all' && deal.stage !== stage) return false;
        if (owner !== 'all' && deal.owner.id !== owner) return false;
        if (dealType !== 'all' && deal.type !== dealType) return false;
        if (property !== 'all' && deal.property.id !== property) return false;
        return true;
    });
    
    sortDeals();
    renderDeals();
    updateMetrics();
}

function sortDeals() {
    filteredDeals.sort((a, b) => {
        let aVal, bVal;
        
        switch(sortField) {
            case 'name':
                aVal = a.name;
                bVal = b.name;
                break;
            case 'property':
                aVal = a.property.name;
                bVal = b.property.name;
                break;
            case 'stage':
                aVal = a.stage;
                bVal = b.stage;
                break;
            case 'owner':
                aVal = a.owner.name;
                bVal = b.owner.name;
                break;
            case 'value':
                aVal = a.commercial.monthlyRent || a.commercial.totalAnnualValue || 0;
                bVal = b.commercial.monthlyRent || b.commercial.totalAnnualValue || 0;
                break;
            case 'nextStep':
                if (a.nextStep?.date && b.nextStep?.date) {
                    aVal = new Date(a.nextStep.date);
                    bVal = new Date(b.nextStep.date);
                } else if (a.nextStep?.date) return -1;
                else if (b.nextStep?.date) return 1;
                else {
                    aVal = new Date(a.updatedAt);
                    bVal = new Date(b.updatedAt);
                    return bVal - aVal;
                }
                break;
            default:
                return 0;
        }
        
        if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
        return 0;
    });
}

function renderDeals() {
    const tbody = document.getElementById('deals-tbody');
    tbody.innerHTML = filteredDeals.map((deal, index) => renderDealRow(deal, index)).join('');
}

// Event listeners
document.getElementById('search-input').addEventListener('input', filterDeals);
document.getElementById('filter-stage').addEventListener('change', filterDeals);
document.getElementById('filter-owner').addEventListener('change', filterDeals);
document.getElementById('filter-deal-type').addEventListener('change', filterDeals);
document.getElementById('filter-property').addEventListener('change', filterDeals);

document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-stage').value = 'all';
    document.getElementById('filter-owner').value = 'all';
    document.getElementById('filter-deal-type').value = 'all';
    document.getElementById('filter-property').value = 'all';
    filterDeals();
});

document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
        const field = btn.getAttribute('data-sort');
        if (sortField === field) {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortOrder = 'asc';
        }
        sortDeals();
        renderDeals();
    });
});

// Initial render
sortDeals();
renderDeals();
updateMetrics();
</script>

</body>
</html>
