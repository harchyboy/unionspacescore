<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="union-logo.svg" />
    <title>Deal Room Dashboard</title>
    <script src='https://cdn.tailwindcss.com'></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    border: "var(--border)",
                    input: "var(--input)",
                    ring: "var(--ring)",
                    background: "var(--background)",
                    foreground: "var(--foreground)",
                    primary: {
                        DEFAULT: "var(--primary)",
                        foreground: "var(--primary-foreground)",
                    },
                    secondary: {
                        DEFAULT: "var(--secondary)",
                        foreground: "var(--secondary-foreground)",
                    },
                    destructive: {
                        DEFAULT: "var(--destructive)",
                        foreground: "var(--destructive-foreground)",
                    },
                    muted: {
                        DEFAULT: "var(--muted)",
                        foreground: "var(--muted-foreground)",
                    },
                    accent: {
                        DEFAULT: "var(--accent)",
                        foreground: "var(--accent-foreground)",
                    },
                    card: {
                        DEFAULT: "var(--card)",
                        foreground: "var(--card-foreground)",
                    },
                },
                borderRadius: {
                    lg: "var(--radius)",
                    md: "calc(var(--radius) - 2px)",
                    sm: "calc(var(--radius) - 4px)",
                },
                fontFamily: {
                    sans: ["var(--font-sans)"],
                    serif: ["var(--font-serif)"],
                    mono: ["var(--font-mono)"],
                },
                boxShadow: {
                    'DEFAULT': 'var(--shadow)',
                },
            },
        }
    }
    </script>
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #FAFAFA;
            --foreground: #0f172a;
            --card: #ffffff;
            --card-foreground: #0f172a;
            --primary: #252525;
            --primary-foreground: #ffffff;
            --secondary: #8E8E8E;
            --secondary-foreground: #ffffff;
            --muted: #FAFAFA;
            --muted-foreground: #0f172a;
            --accent: #8E8E8E;
            --accent-foreground: #ffffff;
            --destructive: #ef4444;
            --destructive-foreground: #ffffff;
            --border: #E6E6E6;
            --input: #FFFFFF;
            --ring: #94a3b8;
            --font-sans: Inter, sans-serif;
            --font-serif: Georgia, serif;
            --font-mono: JetBrains Mono, monospace;
            --radius: 10px;
            --shadow: -2px 4px 12px 4px rgba(51,51,51,0.05);
        }
        
        ::-webkit-scrollbar { display: none;}
        
        body {
            font-family: var(--font-sans);
            background-color: #F0F0F0;
            color: #252525;
        }
        
        .transition-all-smooth {
            transition: all 0.2s ease-in-out;
        }
        
        .hover-lift:hover {
            transform: translateY(-2px);
        }
        
        .chip-filter.active {
            opacity: 1;
        }
        
        .chip-filter.active[data-stage="Viewing"] {
            background-color: #252525 !important;
            color: #ffffff !important;
            border-color: #252525 !important;
        }
        
        .chip-filter.active[data-stage="Heads of Terms"],
        .chip-filter.active[data-stage="Legals"] {
            background-color: #eab308 !important;
            color: #ffffff !important;
            border-color: #eab308 !important;
        }
        
        .chip-filter.active[data-stage="Signed"] {
            background-color: #16a34a !important;
            color: #ffffff !important;
            border-color: #16a34a !important;
        }
        
        .chip-filter.active[data-stage="Lost"] {
            background-color: #ef4444 !important;
            color: #ffffff !important;
            border-color: #ef4444 !important;
        }
        
        @media (max-width: 768px) {
            #metrics-strip .flex {
                flex-direction: row;
                flex-wrap: wrap;
            }
            #metrics-strip .flex > div {
                flex: 1 1 calc(50% - 0.5rem);
                min-width: 140px;
            }
        }
    </style>
    <script src="sidebar.js" defer></script>
</head>
<body class="antialiased">

<div id="app-shell" class="flex h-screen overflow-hidden">
    
    <aside id="sidebar" class="w-64 bg-white border-r border-[#E6E6E6] flex flex-col" data-sidebar-placeholder data-active="deal-room"></aside>
    
    <main id="main-content" class="flex-1 flex flex-col overflow-hidden">
        
        <header id="header" class="bg-white border-b border-[#E6E6E6] px-8 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-6 flex-1">
                <div class="relative flex-1 max-w-xl">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-secondary"></i>
                    <input type="text" placeholder="Search deals, properties, tickets..." class="w-full pl-11 pr-4 py-2.5 bg-muted border border-[#E6E6E6] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <button class="relative p-2 text-secondary hover:text-primary transition-all-smooth">
                    <i class="fa-solid fa-bell text-lg"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-destructive rounded-full"></span>
                </button>
                <button class="p-2 text-secondary hover:text-primary transition-all-smooth">
                    <i class="fa-solid fa-question-circle text-lg"></i>
                </button>
            </div>
        </header>
        
        <div id="page-header" class="bg-white border-b border-[#E6E6E6] px-8 py-6">
            <div class="flex items-start justify-between">
                <div>
                    <h1 class="text-3xl font-semibold text-primary mb-2">Deal Rooms</h1>
                    <p class="text-secondary text-sm">Scan every live deal, spot issues, and jump into the right Deal Room</p>
                </div>
                <button id="create-deal-btn" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-opacity-90 transition-all-smooth flex items-center space-x-2">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span>Create new deal</span>
                </button>
            </div>
        </div>
        
        <div id="summary-chips" class="bg-white border-b border-[#E6E6E6] px-8 py-3">
            <div class="flex items-center gap-3 flex-wrap">
                <button type="button" class="chip-filter inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium transition-all cursor-pointer" style="background-color: rgba(37, 37, 37, 0.1); color: #252525; border: 1px solid rgba(37, 37, 37, 0.2);" data-stage="Viewing" id="chip-viewing">
                    <span class="font-semibold mr-1.5" id="chip-viewing-count">0</span>
                    <span>Viewing</span>
                </button>
                <button type="button" class="chip-filter inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium transition-all cursor-pointer" style="background-color: rgba(234, 179, 8, 0.1); color: #92400e; border: 1px solid rgba(234, 179, 8, 0.2);" data-stage="Heads of Terms" id="chip-hots">
                    <span class="font-semibold mr-1.5" id="chip-hots-count">0</span>
                    <span>Heads of Terms</span>
                </button>
                <button type="button" class="chip-filter inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium transition-all cursor-pointer" style="background-color: rgba(234, 179, 8, 0.1); color: #92400e; border: 1px solid rgba(234, 179, 8, 0.2);" data-stage="Legals" id="chip-legals">
                    <span class="font-semibold mr-1.5" id="chip-legals-count">0</span>
                    <span>Legals</span>
                </button>
                <button type="button" class="chip-filter inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium transition-all cursor-pointer" style="background-color: rgba(22, 163, 74, 0.1); color: #166534; border: 1px solid rgba(22, 163, 74, 0.2);" data-stage="Signed" id="chip-signed">
                    <span class="font-semibold mr-1.5" id="chip-signed-count">0</span>
                    <span>Signed</span>
                </button>
                <button type="button" class="chip-filter inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium transition-all cursor-pointer" style="background-color: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2);" data-stage="Lost" id="chip-lost">
                    <span class="font-semibold mr-1.5" id="chip-lost-count">0</span>
                    <span>Lost</span>
                </button>
            </div>
        </div>
        
        <div id="metrics-strip" class="bg-white border-b border-[#E6E6E6] px-8 py-3">
            <div class="flex items-center gap-4 flex-wrap">
                <!-- Core Metrics -->
                <div class="bg-white rounded-lg border border-[#E6E6E6] p-3 shadow-sm flex-1 min-w-[140px]">
                    <p class="text-xs text-secondary mb-1">Total Open Deals</p>
                    <p class="text-2xl font-semibold text-primary" id="metric-open-deals">0</p>
                </div>
                <div class="bg-white rounded-lg border border-[#E6E6E6] p-3 shadow-sm flex-1 min-w-[140px]">
                    <p class="text-xs text-secondary mb-1">Total Monthly Value</p>
                    <p class="text-2xl font-semibold text-primary" id="metric-monthly-value">£0</p>
                </div>
                
                <!-- Spacer between groups -->
                <div class="w-4 hidden md:block"></div>
                
                <!-- Alerts -->
                <div class="bg-white rounded-lg border border-[#E6E6E6] p-3 shadow-sm flex-1 min-w-[140px]">
                    <p class="text-xs text-secondary mb-1">High Risk Deals</p>
                    <p class="text-2xl font-semibold text-destructive" id="metric-high-risk">0</p>
                </div>
                <div class="bg-white rounded-lg border border-[#E6E6E6] p-3 shadow-sm flex-1 min-w-[140px]">
                    <p class="text-xs text-secondary mb-1">Deals Blocked in Approvals</p>
                    <p class="text-2xl font-semibold text-destructive" id="metric-blocked-approvals">0</p>
                </div>
            </div>
        </div>
        
        <div id="filters-section" class="bg-white border-b border-[#E6E6E6] px-8 py-4">
            <div class="flex items-center space-x-3 flex-wrap gap-2">
                <div class="relative flex-1 min-w-[200px]">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-secondary"></i>
                    <input type="text" id="search-input" placeholder="Search deal name, requirement code, tenant..." class="w-full pl-11 pr-4 py-2.5 bg-muted border border-[#E6E6E6] rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                
                <div class="relative">
                    <select id="filter-stage" class="appearance-none bg-muted border border-[#E6E6E6] rounded-lg px-4 py-2 pr-8 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary w-48">
                        <option value="all">All Stages</option>
                        <option value="Viewing">Viewing</option>
                        <option value="Heads of Terms">Heads of Terms</option>
                        <option value="Legals">Legals</option>
                        <option value="Signed">Signed</option>
                        <option value="Lost">Lost</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary text-xs pointer-events-none"></i>
                </div>
                
                <div class="relative">
                    <select id="filter-owner" class="appearance-none bg-muted border border-[#E6E6E6] rounded-lg px-4 py-2 pr-8 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary w-48">
                        <option value="all">All Owners</option>
                        <option value="1">Sarah Chen</option>
                        <option value="2">Michael Roberts</option>
                        <option value="3">Emma Wilson</option>
                        <option value="4">David Thompson</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary text-xs pointer-events-none"></i>
                </div>
                
                <div class="relative">
                    <select id="filter-deal-type" class="appearance-none bg-muted border border-[#E6E6E6] rounded-lg px-4 py-2 pr-8 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary w-48">
                        <option value="all">All Types</option>
                        <option value="All inclusive">All-inclusive</option>
                        <option value="Bolt on">Bolt-on</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary text-xs pointer-events-none"></i>
                </div>
                
                <div class="relative">
                    <select id="filter-property" class="appearance-none bg-muted border border-[#E6E6E6] rounded-lg px-4 py-2 pr-8 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary w-48">
                        <option value="all">All Properties</option>
                        <option value="prop-1">Principal Place</option>
                        <option value="prop-2">The Leadenhall Building</option>
                        <option value="prop-3">99 Bishopsgate</option>
                        <option value="prop-4">Shoreditch Workspace</option>
                        <option value="prop-5">One Canada Square</option>
                        <option value="prop-6">Broadgate Circle</option>
                        <option value="prop-7">Clerkenwell Green</option>
                        <option value="prop-8">Oxford Street</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary text-xs pointer-events-none"></i>
                </div>
                
                <div class="relative">
                    <select id="filter-tenant" class="appearance-none bg-muted border border-[#E6E6E6] rounded-lg px-4 py-2 pr-8 text-sm text-primary focus:outline-none focus:ring-2 focus:ring-primary w-48">
                        <option value="all">All Tenants</option>
                        <option value="tenant-1">TechCorp Ltd</option>
                        <option value="tenant-2">FinanceHub</option>
                        <option value="tenant-3">StartupCo</option>
                        <option value="tenant-4">MediaWorks</option>
                        <option value="tenant-5">LegalFirm</option>
                        <option value="tenant-6">ConsultingGroup</option>
                        <option value="tenant-7">DesignStudio</option>
                        <option value="tenant-8">RetailBrand</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-secondary text-xs pointer-events-none"></i>
                </div>
                
                <button id="clear-filters" class="text-secondary hover:text-primary text-sm ml-2 flex items-center space-x-1">
                    <i class="fa-solid fa-rotate-left text-xs"></i>
                    <span>Clear all</span>
                </button>
            </div>
        </div>
        
        <div id="deals-list" class="flex-1 overflow-y-auto bg-[#F0F0F0] px-8 py-6">
            <div class="bg-white rounded-lg border border-[#E6E6E6] overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full" id="deals-table">
                        <thead class="bg-muted border-b border-[#E6E6E6]">
                            <tr>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="name">
                                        <span>Deal</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <span class="text-xs font-semibold text-secondary uppercase tracking-wider">Tenant</span>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="property">
                                        <span>Asset</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="value">
                                        <span>Commercial</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="stage">
                                        <span>Stage and health</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="owner">
                                        <span>Ownership & Timing</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-left">
                                    <button class="flex items-center space-x-1 text-xs font-semibold text-secondary uppercase tracking-wider hover:text-primary" data-sort="nextStep">
                                        <span>Next Step</span>
                                        <i class="fa-solid fa-sort text-xs"></i>
                                    </button>
                                </th>
                                <th class="px-4 py-3 text-right">
                                    <span class="text-xs font-semibold text-secondary uppercase tracking-wider">Actions</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="deals-tbody" class="divide-y divide-[#E6E6E6]">
                            <!-- Deals will be inserted here by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

let filteredDeals = [...mockDeals];
let sortField = 'nextStep';
let sortOrder = 'asc';

function formatCurrency(amount) {
    return new Intl.NumberFormat('en-GB', {
        style: 'currency',
        currency: 'GBP',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0,
    }).format(amount);
}

function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    return new Intl.DateTimeFormat('en-GB', {
        day: 'numeric',
        month: 'short',
        year: 'numeric'
    }).format(date);
}

function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}

function getDaysAgo(dateString) {
    if (!dateString) return 0;
    const date = new Date(dateString);
    const now = new Date();
    const diffTime = Math.abs(now - date);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    return diffDays;
}

function getStageColor(stage) {
    const colors = {
        'Viewing': 'primary',
        'Heads of Terms': 'warning',
        'Legals': 'warning',
        'Signed': 'success',
        'Lost': 'destructive'
    };
    return colors[stage] || 'default';
}

function getRiskColor(risk) {
    return risk === 'High' ? 'destructive' : risk === 'Medium' ? 'warning' : 'success';
}

function getApprovalColor(approval) {
    if (approval === 'Pending') return 'warning';
    if (approval === 'Rejected') return 'destructive';
    return 'success';
}

function getApprovalText(approval) {
    if (approval === 'Approved') return 'Approved';
    if (approval === 'Rejected') return 'Rejected';
    return 'Pending';
}

function renderDealRow(deal, index) {
    const stageColor = getStageColor(deal.stage);
    const riskColor = getRiskColor(deal.status.risk);
    const approvalColor = getApprovalColor(deal.status.approvals);
    const bgClass = index % 2 === 1 ? 'bg-[#fafafa]' : '';
    
    // Calculate age of deal
    const ageOfDeal = getDaysAgo(deal.createdAt);
    
    // Format commercial value
    let commercialValue = '';
    if (deal.type === 'All inclusive') {
        commercialValue = formatCurrency(deal.commercial.monthlyRent) + '/mo';
    } else {
        commercialValue = formatCurrency(deal.commercial.coreRent) + ' + ' + formatCurrency(deal.commercial.totalMonthlyCost - deal.commercial.coreRent) + ' = ' + formatCurrency(deal.commercial.totalMonthlyCost) + '/mo';
    }
    
    // Format unit/floor/size
    const unitInfo = deal.property.unit || deal.property.floor || '';
    const sizeInfo = deal.property.size || '';
    const assetDetails = [unitInfo, sizeInfo].filter(Boolean).join(' • ');
    
    return `
        <tr class="${bgClass} hover:bg-[#fafafa] transition-all cursor-pointer" onclick="window.location.href='Deal Room Detail.html?dealId=${deal.id}'">
            <td class="px-4 py-4">
                <div class="font-medium text-primary hover:text-primary/80">${deal.name}</div>
                ${deal.requirementCode ? `<div class="text-xs text-secondary mt-0.5">${deal.requirementCode}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="text-sm text-primary">${deal.tenant.companyName}</div>
                ${deal.tenant.mainContact ? `<div class="text-xs text-secondary">${deal.tenant.mainContact.name}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="text-sm text-primary">${deal.property.name}</div>
                <div class="text-xs text-secondary">${deal.property.submarket || ''}</div>
                ${assetDetails ? `<div class="text-xs text-secondary mt-0.5">${assetDetails}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="text-sm font-medium text-primary">${commercialValue}</div>
                <div class="text-xs text-secondary mt-0.5">${deal.type}</div>
                ${deal.moveInDate ? `<div class="text-xs text-secondary mt-0.5">Move-in: ${formatDate(deal.moveInDate)}</div>` : ''}
            </td>
            <td class="px-4 py-4">
                <div class="flex flex-col gap-1.5">
                    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium w-fit ${
                        stageColor === 'primary' ? 'bg-primary text-white' :
                        stageColor === 'warning' ? 'bg-yellow-500 text-white' :
                        stageColor === 'success' ? 'bg-green-600 text-white' :
                        stageColor === 'destructive' ? 'bg-destructive text-white' :
                        'bg-muted text-primary'
                    }">${deal.stage}</span>
                    <div class="flex items-center gap-2 text-xs text-secondary">
                        <span class="inline-flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full ${
                                riskColor === 'destructive' ? 'bg-destructive' :
                                riskColor === 'warning' ? 'bg-yellow-500' :
                                'bg-green-600'
                            }"></span>
                            <span class="lowercase">${deal.status.risk.toLowerCase()} risk</span>
                        </span>
                        <span class="text-secondary">•</span>
                        <span class="inline-flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full ${
                                approvalColor === 'destructive' ? 'bg-destructive' :
                                approvalColor === 'warning' ? 'bg-yellow-500' :
                                'bg-green-600'
                            }"></span>
                            <span class="lowercase">Approval ${getApprovalText(deal.status.approvals).toLowerCase()}</span>
                        </span>
                    </div>
                </div>
            </td>
            <td class="px-4 py-4">
                <div class="flex items-center space-x-2 mb-1">
                    ${deal.owner.avatar ? 
                        `<img src="${deal.owner.avatar}" alt="${deal.owner.name}" class="w-8 h-8 rounded-full object-cover">` :
                        `<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white text-xs font-semibold">${getInitials(deal.owner.name)}</div>`
                    }
                    <span class="text-sm text-primary">${deal.owner.name}</span>
                </div>
                <div class="text-xs text-secondary">${ageOfDeal} days old • ${deal.daysInStage} days in stage</div>
            </td>
            <td class="px-4 py-4">
                ${deal.nextStep ? `
                    ${deal.nextStep.date ? `<div class="text-xs text-secondary mb-0.5">${formatDate(deal.nextStep.date)}</div>` : ''}
                    <div class="text-sm text-primary">${deal.nextStep.description}</div>
                ` : '<span class="text-sm text-secondary">Up to date</span>'}
            </td>
            <td class="px-4 py-4 text-right">
                <a href="Deal Room Detail.html?dealId=${deal.id}" class="text-primary hover:text-primary/80 text-sm font-medium" onclick="event.stopPropagation()">View Deal Room</a>
            </td>
        </tr>
    `;
}

function updateMetrics() {
    const openDeals = filteredDeals.filter(d => d.stage !== 'Signed' && d.stage !== 'Lost');
    const totalMonthlyValue = openDeals.reduce((sum, deal) => {
        if (deal.type === 'All inclusive') {
            return sum + (deal.commercial.monthlyRent || 0);
        } else {
            return sum + (deal.commercial.totalMonthlyCost || 0);
        }
    }, 0);
    
    const viewing = filteredDeals.filter(d => d.stage === 'Viewing').length;
    const hots = filteredDeals.filter(d => d.stage === 'Heads of Terms').length;
    const legals = filteredDeals.filter(d => d.stage === 'Legals').length;
    const signed = filteredDeals.filter(d => d.stage === 'Signed').length;
    const lost = filteredDeals.filter(d => d.stage === 'Lost').length;
    
    const highRisk = filteredDeals.filter(d => d.status.risk === 'High').length;
    const blockedApprovals = filteredDeals.filter(d => d.status.approvals === 'Pending' || d.status.approvals === 'Rejected').length;
    
    document.getElementById('metric-open-deals').textContent = openDeals.length;
    document.getElementById('metric-monthly-value').textContent = formatCurrency(totalMonthlyValue);
    document.getElementById('metric-high-risk').textContent = highRisk;
    document.getElementById('metric-blocked-approvals').textContent = blockedApprovals;
    
    // Update summary chips
    document.getElementById('chip-viewing-count').textContent = viewing;
    document.getElementById('chip-hots-count').textContent = hots;
    document.getElementById('chip-legals-count').textContent = legals;
    document.getElementById('chip-signed-count').textContent = signed;
    document.getElementById('chip-lost-count').textContent = lost;
}

function filterDeals() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const stage = document.getElementById('filter-stage').value;
    const owner = document.getElementById('filter-owner').value;
    const dealType = document.getElementById('filter-deal-type').value;
    const property = document.getElementById('filter-property').value;
    const tenant = document.getElementById('filter-tenant').value;
    
    filteredDeals = mockDeals.filter(deal => {
        if (search && !deal.name.toLowerCase().includes(search) && 
            !deal.tenant.companyName.toLowerCase().includes(search) &&
            !(deal.requirementCode && deal.requirementCode.toLowerCase().includes(search))) {
            return false;
        }
        if (stage !== 'all' && deal.stage !== stage) return false;
        if (owner !== 'all' && deal.owner.id !== owner) return false;
        if (dealType !== 'all' && deal.type !== dealType) return false;
        if (property !== 'all' && deal.property.id !== property) return false;
        if (tenant !== 'all' && deal.tenant.id !== tenant) return false;
        return true;
    });
    
    sortDeals();
    renderDeals();
    updateMetrics();
}

function sortDeals() {
    filteredDeals.sort((a, b) => {
        let aVal, bVal;
        
        switch(sortField) {
            case 'name':
                aVal = a.name;
                bVal = b.name;
                break;
            case 'property':
                aVal = a.property.name;
                bVal = b.property.name;
                break;
            case 'stage':
                // Sort by Stage first, then Risk, then Approvals
                const stageOrder = { 'Viewing': 1, 'Heads of Terms': 2, 'Legals': 3, 'Signed': 4, 'Lost': 5 };
                const riskOrder = { 'High': 3, 'Medium': 2, 'Low': 1 };
                const approvalOrder = { 'Pending': 2, 'Rejected': 3, 'Approved': 1 };
                
                const aStage = stageOrder[a.stage] || 99;
                const bStage = stageOrder[b.stage] || 99;
                if (aStage !== bStage) {
                    return sortOrder === 'asc' ? (aStage - bStage) : (bStage - aStage);
                }
                
                const aRisk = riskOrder[a.status.risk] || 0;
                const bRisk = riskOrder[b.status.risk] || 0;
                if (aRisk !== bRisk) {
                    return sortOrder === 'asc' ? (aRisk - bRisk) : (bRisk - aRisk);
                }
                
                const aApproval = approvalOrder[getApprovalText(a.status.approvals)] || 0;
                const bApproval = approvalOrder[getApprovalText(b.status.approvals)] || 0;
                aVal = aApproval;
                bVal = bApproval;
                break;
            case 'owner':
                aVal = a.owner.name;
                bVal = b.owner.name;
                break;
            case 'value':
                if (a.type === 'All inclusive') {
                    aVal = a.commercial.monthlyRent || 0;
                } else {
                    aVal = a.commercial.totalMonthlyCost || 0;
                }
                if (b.type === 'All inclusive') {
                    bVal = b.commercial.monthlyRent || 0;
                } else {
                    bVal = b.commercial.totalMonthlyCost || 0;
                }
                break;
            case 'nextStep':
                if (a.nextStep?.date && b.nextStep?.date) {
                    aVal = new Date(a.nextStep.date);
                    bVal = new Date(b.nextStep.date);
                } else if (a.nextStep?.date) return -1;
                else if (b.nextStep?.date) return 1;
                else {
                    aVal = new Date(a.updatedAt);
                    bVal = new Date(b.updatedAt);
                    return bVal - aVal;
                }
                break;
            default:
                return 0;
        }
        
        if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
        return 0;
    });
}

function renderDeals() {
    const tbody = document.getElementById('deals-tbody');
    if (filteredDeals.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-secondary">No deals found matching your filters</td></tr>';
    } else {
        tbody.innerHTML = filteredDeals.map((deal, index) => renderDealRow(deal, index)).join('');
    }
}

// Event listeners
document.getElementById('search-input').addEventListener('input', filterDeals);
document.getElementById('filter-stage').addEventListener('change', (e) => {
    const selectedStage = e.target.value;
    
    // Update chip selection
    document.querySelectorAll('.chip-filter').forEach(chip => {
        chip.classList.remove('active');
        if (chip.getAttribute('data-stage') === selectedStage) {
            chip.classList.add('active');
            selectedStageChip = chip;
        } else if (selectedStage === 'all') {
            selectedStageChip = null;
        }
    });
    
    filterDeals();
});
document.getElementById('filter-owner').addEventListener('change', filterDeals);
document.getElementById('filter-deal-type').addEventListener('change', filterDeals);
document.getElementById('filter-property').addEventListener('change', filterDeals);
document.getElementById('filter-tenant').addEventListener('change', filterDeals);

document.getElementById('clear-filters').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-stage').value = 'all';
    document.getElementById('filter-owner').value = 'all';
    document.getElementById('filter-deal-type').value = 'all';
    document.getElementById('filter-property').value = 'all';
    document.getElementById('filter-tenant').value = 'all';
    
    // Clear chip selection
    if (selectedStageChip) {
        selectedStageChip.classList.remove('active');
        selectedStageChip = null;
    }
    
    filterDeals();
});

document.querySelectorAll('[data-sort]').forEach(btn => {
    btn.addEventListener('click', () => {
        const field = btn.getAttribute('data-sort');
        if (sortField === field) {
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortOrder = 'asc';
        }
        sortDeals();
        renderDeals();
    });
});

// Chip filter functionality
let selectedStageChip = null;

document.querySelectorAll('.chip-filter').forEach(chip => {
    chip.addEventListener('click', () => {
        const stage = chip.getAttribute('data-stage');
        
        // Toggle selection
        if (selectedStageChip === chip) {
            // Deselect
            chip.classList.remove('active');
            selectedStageChip = null;
            document.getElementById('filter-stage').value = 'all';
        } else {
            // Deselect previous
            if (selectedStageChip) {
                selectedStageChip.classList.remove('active');
            }
            // Select new
            chip.classList.add('active');
            selectedStageChip = chip;
            document.getElementById('filter-stage').value = stage;
        }
        
        filterDeals();
    });
});

// Initial render
sortDeals();
renderDeals();
updateMetrics();
